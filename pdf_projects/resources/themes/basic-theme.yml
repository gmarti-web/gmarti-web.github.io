extends: default
admonition:
  background-color: #ede8fa
  label:
    font-color: #ff0000

admonition_tip:
  border-color: #872de6
  text-align: left
  border-radius: 3
  border-style: dashed
  font-kerning: none
  padding: 0.3cm
  label:
    font-color: #00ff00

admonition_important:
  label:
    font-color: #ff0000

heading:
  h1-font-size: $base-font-size * 1.20
  h2-font-size: $base-font-size * 1.15
  h3-font-size: $base-font-size * 1.05
